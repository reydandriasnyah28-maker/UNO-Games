<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Ultimate Web</title>
    <style>
        :root {
            --uno-red: #ff5555; --uno-blue: #5555ff;
            --uno-yellow: #ffaa00; --uno-green: #55aa55;
        }
        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #222, #000); color: white;
            overflow: hidden; height: 100vh;
        }
        /* Layar Login & Menu */
        .screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }
        .active { display: flex; }
        
        .card-bg { position: absolute; opacity: 0.1; z-index: -1; width: 100%; height: 100%; display: flex; flex-wrap: wrap; }
        
        input { padding: 10px; margin: 5px; border-radius: 5px; border: none; width: 200px; }
        button { 
            padding: 10px 20px; margin: 10px; cursor: pointer; 
            background: var(--uno-red); color: white; border: none; border-radius: 20px;
            font-weight: bold; transition: 0.3s;
        }
        button:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--uno-red); }

        /* Game UI */
        #game-ui { position: relative; width: 100%; height: 100%; }
        .hand { display: flex; justify-content: center; position: absolute; bottom: 20px; width: 100%; gap: 5px; }
        .card { 
            width: 60px; height: 90px; border-radius: 8px; border: 2px solid white;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .card:hover { transform: translateY(-20px); }
        .deck { position: absolute; right: 50px; top: 50%; transform: translateY(-50%); }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/UNO_Logo.svg" width="200" alt="UNO Logo">
        <h2>Login Pemain</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Masuk</button>
    </div>

    <div id="menu-screen" class="screen">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/f9/UNO_Logo.svg" width="150">
        <h3 id="welcome-text"> Selamat Datang!</h3>
        <button onclick="startMode('1vs1')">UNO HP (1vs1 Local)</button>
        <button onclick="startMode('bot')">Main vs BOT</button>
        <button onclick="logout()">Keluar</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-controls" style="position: absolute; top: 10px; left: 10px;">
            <button onclick="toggleMenu()">Menu</button>
        </div>
        
        <div class="deck" onclick="drawCard()">
            <div class="card" style="background: #333;">🎴</div>
            <p>Ambil Kartu</p>
        </div>

        <div id="center-pile" style="margin-bottom: 100px;">
            </div>

        <div id="player-hand" class="hand"></div>
    </div>

    <div id="pause-menu" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(0,0,0,0.9); padding:30px; border-radius:20px; text-align:center; z-index:100;">
        <button onclick="toggleMenu()">Lanjut</button>
        <button onclick="toggleMusic()">Matikan Musik</button>
        <button onclick="location.reload()">Berhenti/Selesai</button>
    </div>

    <audio id="bg-music" loop src="https://www.bensound.com/bensound-music/bensound-energy.mp3"></audio>

    <script>
        let isMusicPlaying = false;
        const bgMusic = document.getElementById('bg-music');

        // Sistem Akun Simple
        function handleLogin() {
            const user = document.getElementById('username').value;
            if(user) {
                localStorage.setItem('uno_user', user);
                showScreen('menu-screen');
                document.getElementById('welcome-text').innerText = "Halo, " + user;
                playSound('click');
            }
        }

        // Cek Login Saat Refresh
        window.onload = () => {
            if(localStorage.getItem('uno_user')) {
                showScreen('menu-screen');
                document.getElementById('welcome-text').innerText = "Halo, " + localStorage.getItem('uno_user');
            }
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function playSound(type) {
            const audio = new Audio();
            if(type === 'click') audio.src = 'https://actions.google.com/sounds/v1/foley/drawbridge_close.ogg';
            if(type === 'card') audio.src = 'https://actions.google.com/sounds/v1/foley/paper_shuffle.ogg';
            audio.play();
        }

        function toggleMusic() {
            if(isMusicPlaying) {
                bgMusic.pause();
            } else {
                bgMusic.play();
            }
            isMusicPlaying = !isMusicPlaying;
        }

        function toggleMenu() {
            const m = document.getElementById('pause-menu');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }

        function startMode(mode) {
            if(mode === '1vs1') {
                const p2 = prompt("Masukkan Nama Pemain 2:");
                alert("Mulai Permainan 1vs1: " + localStorage.getItem('uno_user') + " vs " + p2);
            }
            showScreen('game-screen');
            if(!isMusicPlaying) toggleMusic();
            renderInitialCards();
        }

        function renderInitialCards() {
            const hand = document.getElementById('player-hand');
            hand.innerHTML = '';
            for(let i=0; i<7; i++) {
                const c = document.createElement('div');
                c.className = 'card';
                c.style.backgroundColor = ['#ff5555', '#5555ff', '#ffaa00', '#55aa55'][Math.floor(Math.random()*4)];
                c.innerText = Math.floor(Math.random()*9);
                c.onclick = () => { playSound('card'); c.remove(); };
                hand.appendChild(c);
            }
        }

        function logout() {
            localStorage.removeItem('uno_user');
            location.reload();
        }
    </script>
</body>
</html>
